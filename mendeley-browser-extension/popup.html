<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mendeley Local Syncer</title>
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(22, 28, 45, 0.6);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      width: 320px;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 16px;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a78bfa 0%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, var(--primary) 0%, #38bdf8 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      color: #fff;
    }

    .status-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .status-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-val {
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.active {
      background-color: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 1.5s infinite;
    }

    .dot.inactive {
      background-color: var(--warning);
      box-shadow: 0 0 8px var(--warning);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      background: rgba(17, 24, 39, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-main);
      font-size: 13px;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    button {
      background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      background: #374151;
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .console {
      background: #040711;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      font-size: 11px;
      min-height: 50px;
      max-height: 80px;
      overflow-y: auto;
      color: #38bdf8;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .console-error {
      color: var(--danger);
    }

    .console-success {
      color: var(--success);
    }

    .footer {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-logo">M</div>
      <h1>Mendeley Local Syncer</h1>
    </div>

    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Mendeley Web Status</span>
        <span class="status-val" id="mendeley-status">
          <span class="dot inactive" id="mendeley-dot"></span>
          <span id="mendeley-status-text">Disconnected</span>
        </span>
      </div>
      <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;" id="status-hint">
        Please visit & refresh Mendeley Reference Manager Library.
      </div>
    </div>

    <div class="input-group">
      <label for="server-url">Local Server URL</label>
      <input type="text" id="server-url" value="http://localhost:3000" placeholder="e.g. http://192.168.1.50:3000">
    </div>

    <!-- Manual Token Panel (Fallback Developer tool) -->
    <div style="margin-top: 4px;">
      <a href="#" id="toggle-manual-token" style="color: var(--primary); font-size: 11px; text-decoration: none; display: flex; align-items: center; gap: 4px; font-weight: 500;">
        ⚙️ Manual Authorization Override
      </a>
      <div id="manual-token-container" style="display: none; flex-direction: column; gap: 8px; margin-top: 8px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; border: 1px solid var(--border-color);">
        <label for="manual-token-input" style="font-size: 9px;">Bearer Token or JWT</label>
        <textarea id="manual-token-input" rows="2" placeholder="eyJhbGciOi..." style="background: rgba(0,0,0,0.4); border: 1px solid var(--border-color); border-radius: 6px; padding: 6px; color: var(--text-main); font-family: monospace; font-size: 10px; resize: none;"></textarea>
        <button id="save-token-btn" style="padding: 6px; font-size: 11px; background: var(--primary);">Save Manual Token</button>
      </div>
    </div>

    <button id="sync-btn" disabled>
      <span>Sync References Now</span>
    </button>

    <div class="console" id="log-console">
      <div>[System] Ready.</div>
    </div>

    <div class="footer">
      Mendeley Local Sync Suite v1.0.0
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
